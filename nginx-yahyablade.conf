server {
    listen 80;
    server_name yahyablade.com www.yahyablade.com;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Laravel API + Admin — direct to PHP-FPM
    location ~ ^/(api|admin|storage) {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/yahyablade-api/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_ROOT   /var/www/yahyablade-api/public;
        fastcgi_param SERVER_NAME     $host;
        include fastcgi_params;
    }

    # Images — long cache
    location ~* \.(jpg|jpeg|png|webp|gif|ico|svg|css|js|woff2?)$ {
        root /var/www/yahyablade;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static frontend (SPA — all other routes)
    location / {
        root /var/www/yahyablade;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}

# ── Admin subdomain ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.yahyablade.com;

    root /var/www/yahyablade-api/public;
    index index.php;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # Redirect bare subdomain root to /admin
    location = / {
        return 301 /admin;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param SERVER_NAME     $host;
        include fastcgi_params;
    }

    # Block public API from admin subdomain
    location ~ ^/api {
        return 403;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}
